<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#111817" />
    <meta name="description" content="Groot Theft Bakkie — an original open-world Jozi story built with Three.js." />
    <link rel="canonical" href="https://www.groottheftbakkie.com/" />
    <!-- Installed (Add to Home Screen) launches get true immersive: manifest display:fullscreen hides
         Android's status bar (browser-tab fullscreen cannot), and standalone is iOS's only extra-space path. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GT Bakkie" />
    <title>Groot Theft Bakkie</title>
    <style>
      /* Critical boot UI: intentionally inline so slow JS/WebGL startup never leaves a black screen. */
      #boot-loading { position: fixed; inset: 0; z-index: 1000; display: grid; place-items: center; padding: 24px; color: #f2edda; background: #111817; font-family: Inter, "Helvetica Neue", Arial, sans-serif; }
      .boot-loading__card { width: min(440px, 90vw); padding: 28px; border-top: 7px solid #f7c843; background: #17211f; box-shadow: 12px 12px 0 rgba(0, 0, 0, .28), 0 18px 60px rgba(0, 0, 0, .42); }
      .boot-loading__eyebrow { margin: 0 0 8px; color: #f7c843; font-size: 10px; font-weight: 900; letter-spacing: 2.2px; text-transform: uppercase; }
      .boot-loading__card h1 { margin: 0; font-size: clamp(34px, 7vw, 57px); font-weight: 950; line-height: .92; letter-spacing: -1.8px; text-transform: uppercase; }
      .boot-loading__track { height: 12px; margin: 24px 0 12px; overflow: hidden; background: rgba(242, 237, 218, .12); }
      .boot-loading__track i { position: relative; display: block; width: 12%; height: 100%; background: #f7c843; }
      .boot-loading__track i::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .5), transparent); animation: boot-loading-pulse 1.1s ease-in-out infinite; }
      .boot-loading__status { display: flex; justify-content: space-between; gap: 16px; color: #c8c4ad; font-size: 12px; }
      .boot-loading__status strong { color: #f2edda; }
      @keyframes boot-loading-pulse { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
      @media (prefers-reduced-motion: reduce) { .boot-loading__track i::after { animation: none; } }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="boot-loading" role="status" aria-live="polite" aria-busy="true">
      <section class="boot-loading__card">
        <p class="boot-loading__eyebrow">CITY SERVICES</p>
        <h1>Getting Joburg ready</h1>
        <div class="boot-loading__track" role="progressbar" aria-label="Loading game" aria-valuemin="0" aria-valuemax="100" aria-valuenow="12"><i></i></div>
        <div class="boot-loading__status"><strong>Starting city systems</strong><span>12%</span></div>
      </section>
    </div>
    <noscript>This game requires JavaScript to build Johannesburg.</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
